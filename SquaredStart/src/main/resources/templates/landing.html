<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Squared | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<h1 class="text-center text-4xl font-extrabold tracking-tight text-slate-900">Welcome to SQUARED</h1>
<h3 class="mt-2 text-center text-lg font-semibold text-slate-700">Plan your urban activity!</h3>
<main class="min-h-screen bg-white px-6 py-10 text-white">
    <section id="cards-container" class="mx-auto flex w-full max-w-7xl flex-wrap gap-4"></section>
</main>
<script>
    (function loadCityCards() {
        const cardsContainer = document.getElementById('cards-container');
        if (!cardsContainer) {
            return;
        }

        const cityTerms = [
            'new-york', 'tokyo', 'madrid', 'paris', 'london',
            'berlin', 'rome', 'barcelona', 'lisbon', 'amsterdam',
            'dubai', 'singapore', 'seoul', 'sydney', 'toronto',
            'chicago', 'hong-kong', 'mexico-city', 'buenos-aires', 'sao-paulo',
            'istanbul', 'vienna', 'prague', 'athens', 'stockholm'
        ];

        cardsContainer.innerHTML = cityTerms.map(function (city, index) {
            const cityLabel = city.replace(/-/g, ' ').replace(/\b\w/g, function (letter) {
                return letter.toUpperCase();
            });
            const imageUrl = 'https://source.unsplash.com/1200x600/?city,' + encodeURIComponent(city) + '&sig=' + (index + 1);
            const fallbackUrl = 'https://picsum.photos/seed/city-' + (index + 1) + '/1200/600';

            return '' +
                '<article class="relative h-auto w-full overflow-hidden rounded-2xl bg-gradient-to-br from-fuchsia-600 via-indigo-600 to-sky-500 shadow-lg shadow-indigo-950/25 ring-1 ring-black/5 sm:basis-[calc(50%-0.5rem)] md:basis-[calc(33.333%-0.67rem)] lg:basis-[calc(20%-0.8rem)]">' +
                '<div class="relative aspect-[2/1]">' +
                '<img class="city-card-image absolute inset-0 h-full w-full object-cover" src="' + imageUrl + '" alt="Vista urbana de ' + cityLabel + '" loading="lazy" referrerpolicy="no-referrer" data-fallback="' + fallbackUrl + '">' +
                '<div class="absolute inset-0 bg-black/30"></div>' +
                '<footer class="absolute inset-x-0 bottom-0 bg-black/45 px-3 py-2 backdrop-blur-sm">' +
                '<h2 class="text-sm font-bold tracking-tight">' + cityLabel + '</h2>' +
                '<h3 class="text-[11px] font-medium text-indigo-100">Urban Stories Collection</h3>' +
                '</footer>' +
                '</div>' +
                '</article>';
        }).join('');

        const allImages = cardsContainer.querySelectorAll('.city-card-image');
        allImages.forEach(function (imageElement) {
            imageElement.onerror = function () {
                imageElement.src = imageElement.getAttribute('data-fallback') || 'https://picsum.photos/1200/600?grayscale';
            };
        });
    })();
</script>
</body>
</html>
