<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | Scored</title>
    <link rel="stylesheet" th:href="@{/css/landingPage.css}"/>
    <style>
        /* Estilos mínimos para el formulario de login */
        body { font-family: Arial, sans-serif; background: #f6f7fb; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .card { background: #ffffff; padding: 28px; border-radius: 12px; box-shadow: 0 8px 28px rgba(17,24,39,0.06); width: 320px; }
        .card h2 { margin: 0 0 16px 0; text-align:center; }
        .card label { display:block; font-size: 0.9rem; margin-bottom:6px; }
        .card input { width:100%; padding:10px 12px; margin-bottom:14px; border-radius:8px; border:1px solid #e6e9ef; }
        .card button { width:100%; padding:10px 12px; border-radius:8px; background: linear-gradient(180deg, #ffd54a 0%, #fbbf24 100%); border:none; font-weight:700; cursor:pointer; }
        .error { color: #b91c1c; font-size:0.9rem; margin-bottom:10px; text-align:center; }
    </style>
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Login | Scored</title>
    <link rel="stylesheet" th:href="@{/css/landingPage.css}"/>
</head>
<body>
<main style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;">
    <form class="form-card" method="post" th:action="@{/login}">
        <h2>Iniciar sesión</h2>
        <div th:if="${errorMessage}" class="muted" style="color:#b91c1c;margin-bottom:12px;">[[${errorMessage}]]</div>
        <div class="form-group">
            <label for="username">Usuario</label>
            <input id="username" name="username" type="text" class="form-control" required/>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" class="form-control" required/>
        </div>
        <div>
            <button class="btn btn-primary" type="submit">Entrar</button>
        </div>
    </form>
</main>
</body>
</html>
