<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Register | Scored</title>
    <link rel="stylesheet" th:href="@{/css/landingPage.css}"/>
    <style>
        body { font-family: Arial, sans-serif; background: #f6f7fb; display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .card { background: #ffffff; padding: 28px; border-radius: 12px; box-shadow: 0 8px 28px rgba(17,24,39,0.06); width: 380px; }
        .card h2 { margin: 0 0 16px 0; text-align:center; }
        .card label { display:block; font-size: 0.9rem; margin-bottom:6px; }
        .card input { width:100%; padding:10px 12px; margin-bottom:14px; border-radius:8px; border:1px solid #e6e9ef; }
        .card button { width:100%; padding:10px 12px; border-radius:8px; background: linear-gradient(180deg, #ffd54a 0%, #fbbf24 100%); border:none; font-weight:700; cursor:pointer; }
        .muted { font-size:0.85rem; color:#6b7280; margin-bottom:12px; }
    </style>
</head>
<body>
<form class="card" method="post" th:action="@{/register}">
    <h2>Crear cuenta</h2>
    <div class="muted">Rellena los campos para crear tu usuario. (No se conecta a base de datos aún)</div>
    <div>
        <label for="username">Usuario</label>
        <input id="username" name="username" type="text" placeholder="usuario" required/>
    </div>
    <div>
        <label for="email">Correo electrónico</label>
        <input id="email" name="email" type="email" placeholder="tucorreo@ejemplo.com" required/>
    </div>
    <div>
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" placeholder="contraseña" required/>
    </div>
    <div>
        <label for="confirmPassword">Confirmar contraseña</label>
        <input id="confirmPassword" name="confirmPassword" type="password" placeholder="repite la contraseña" required/>
    </div>
    <div>
        <button type="submit">Crear cuenta</button>
    </div>
</form>
</body>
</html>
