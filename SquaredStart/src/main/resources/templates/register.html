<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Register | Scored</title>
    <link rel="icon" th:href="@{/icons/scored-logo.svg}"/>
    <link rel="stylesheet" th:href="@{/css/register.css}"/>
    <link rel="stylesheet" th:href="@{/css/globals/global-colors.css}"/>
    <link rel="stylesheet" th:href="@{/css/globals/global-fonts.css}"/>
</head>
<body>
<main>
    <form class="card" method="post" th:action="@{/register}">
        <h2>Crear cuenta</h2>
        <div class="muted">Rellena los campos para crear tu usuario.</div>
        <div>
            <label for="username">Usuario</label>
            <input id="username" name="username" type="text" placeholder="usuario" required/>
        </div>
        <div>
            <label for="email">Correo electrónico</label>
            <input id="email" name="email" type="email" placeholder="tucorreo@ejemplo.com" required/>
        </div>
        <div>
            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" placeholder="contraseña" required/>
        </div>
        <div>
            <label for="confirmPassword">Confirmar contraseña</label>
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="repite la contraseña"
                   required/>
        </div>
        <div>
            <button type="submit">Crear cuenta</button>
        </div>
    </form>
    <div id="backlink">
        <a th:href="@{/welcome}">Volver a la pagina principal</a>
    </div>
</main>
</body>
</html>
