<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Register | Scored</title>
    <link rel="stylesheet" th:href="@{/css/landingPage.css}"/>
</head>
<body>
<main style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;">
    <form class="form-card" method="post" th:action="@{/register}">
        <h2>Crear cuenta</h2>
        <div class="muted">Rellena los campos para crear tu usuario. (No se conecta a base de datos aún)</div>
        <div class="form-group">
            <label for="username">Usuario</label>
            <input id="username" name="username" type="text" class="form-control" placeholder="usuario" required/>
        </div>
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input id="email" name="email" type="email" class="form-control" placeholder="tucorreo@ejemplo.com" required/>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" class="form-control" placeholder="contraseña" required/>
        </div>
        <div class="form-group">
            <label for="confirmPassword">Confirmar contraseña</label>
            <input id="confirmPassword" name="confirmPassword" type="password" class="form-control" placeholder="repite la contraseña" required/>
        </div>
        <div>
            <button class="btn btn-primary" type="submit">Crear cuenta</button>
        </div>
    </form>
</main>
</body>
</html>
